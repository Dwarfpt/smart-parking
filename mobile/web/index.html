  <!-- Google Sign-In (GIS) для Flutter Web -->
  <meta name="google-signin-client_id" content="600607167879-med62qfl9njdnk3r03jl0stm8aabvj91.apps.googleusercontent.com">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
  <script>
    // GIS wrapper — вызывается из Dart через js interop
    var _gisInitialized = false;
    var _gisResolve = null;

    function triggerGoogleSignIn(clientId) {
      return new Promise(function(resolve) {
        if (!_gisInitialized) {
          _gisInitialized = true;
          google.accounts.id.initialize({
            client_id: clientId,
            callback: function(response) {
              if (_gisResolve) {
                _gisResolve(response.credential);
                _gisResolve = null;
              }
            },
            cancel_on_tap_outside: false,
            use_fedcm_for_prompt: true,
          });
        }
        _gisResolve = resolve;
        google.accounts.id.prompt(function(notification) {
          if (notification.isNotDisplayed() || notification.isSkippedMoment()) {
            resolve(null);
          }
        });
      });
    }
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
