; PlatformIO — ESP32-CAM (Выезд / Exit)
; Камера на выезде: HTTP JPEG сервер для QR-сканирования
; Статический IP: 192.168.100.49

[env:esp32cam]
platform = espressif32
board = esp32cam
framework = arduino
monitor_speed = 115200
monitor_rts = 0
monitor_dtr = 0
upload_speed = 921600
board_build.psram = enabled
build_flags = 
	-DBOARD_HAS_PSRAM
	-I include
	-std=gnu++17
build_unflags = -std=gnu++11
lib_deps = 
	yoursunny/esp32cam @ ^0.0.20250112
