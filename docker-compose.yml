# ==========================================
#  Smart Parking — Docker Compose
#  Запуск: docker compose up --build
# ==========================================

services:
  # ===== MongoDB =====
  mongo:
    image: mongo:8.0
    container_name: sp-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: mongosh --eval "db.adminCommand('ping')" --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ===== MQTT Broker (Mosquitto) =====
  mqtt:
    image: eclipse-mosquitto:2
    container_name: sp-mqtt
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mqtt_data:/mosquitto/data
      - mqtt_log:/mosquitto/log
    healthcheck:
      test: mosquitto_sub -t '$$SYS/broker/uptime' -C 1 -W 3 || exit 1
      interval: 10s
      timeout: 5s
      retries: 3

  # ===== Backend (Node.js / Express) =====
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: sp-server
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=mongodb://mongo:27017/smart-parking
      - JWT_SECRET=${JWT_SECRET:-your_super_secret_key_change_in_production_2026}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-7d}
      - MQTT_BROKER_URL=mqtt://mqtt:1883
      - CORS_ORIGIN=http://localhost:3000,http://localhost:8080
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-Smart Parking <noreply@smartparking.md>}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GOOGLE_CALLBACK_URL=${GOOGLE_CALLBACK_URL:-http://localhost:5000/api/auth/google/callback}
      - CAMERA_URL=${CAMERA_URL:-http://192.168.100.48}
      - CAMERA_EXIT_URL=${CAMERA_EXIT_URL:-http://192.168.100.49}
      - PLATE_RECOGNIZER_TOKEN=${PLATE_RECOGNIZER_TOKEN:-}
    depends_on:
      mongo:
        condition: service_healthy
      mqtt:
        condition: service_started
    healthcheck:
      test: wget -qO- http://localhost:5000/api/health || exit 1
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ===== Seed (одноразовая инициализация данных) =====
  seed:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: sp-seed
    command: ["node", "src/seed.js"]
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongo:27017/smart-parking
    depends_on:
      mongo:
        condition: service_healthy
    restart: "no"

  # ===== Web Frontend (React + Vite → Nginx) =====
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        - VITE_GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
    container_name: sp-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      server:
        condition: service_healthy

  # ===== Mobile App (Flutter Web → Nginx) =====
  mobile:
    build:
      context: ./mobile
      dockerfile: Dockerfile
      args:
        - API_BASE_URL=http://localhost:5000/api
        - SOCKET_URL=http://localhost:5000
    container_name: sp-mobile
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      server:
        condition: service_healthy

volumes:
  mongo_data:
    driver: local
  mqtt_data:
    driver: local
  mqtt_log:
    driver: local
