<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4F46E5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818CF8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366F1;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="10" y="10" width="180" height="180" rx="40" ry="40" fill="url(#bgGrad)" />
  <!-- Location pin shape -->
  <path d="M100 25 C65 25 40 50 40 82 C40 120 100 175 100 175 C100 175 160 120 160 82 C160 50 135 25 100 25Z" fill="url(#pinGrad)" opacity="0.3"/>
  <!-- Inner circle -->
  <circle cx="100" cy="82" r="45" fill="white" opacity="0.95"/>
  <!-- P letter -->
  <text x="100" y="100" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="64" font-weight="bold" fill="#4F46E5">P</text>
  <!-- Small car silhouette at bottom -->
  <g transform="translate(72, 140)" fill="white" opacity="0.8">
    <rect x="0" y="6" width="56" height="14" rx="5" />
    <rect x="6" y="0" width="44" height="14" rx="4" />
    <circle cx="14" cy="22" r="5" fill="#4F46E5"/>
    <circle cx="42" cy="22" r="5" fill="#4F46E5"/>
  </g>
</svg>